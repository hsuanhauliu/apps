<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Constellation Creator</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome CDN -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
        xintegrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        :root {
            --accent: #06b6d4;
            --accent-strong: #0891b2;
            --line: rgba(148, 163, 184, .16);
        }
        * { -webkit-tap-highlight-color: transparent; }
        body {
            font-family: 'Inter', sans-serif;
            overflow: hidden;
            /* Prevent body scroll */
            color: #e2e8f0;
            background:
                radial-gradient(1100px 700px at 82% -12%, #0b3a4a 0%, rgba(11,58,74,0) 60%),
                radial-gradient(900px 650px at -8% 108%, #0c1a33 0%, rgba(12,26,51,0) 55%),
                #05070f;
        }
        /* Faint starfield behind everything */
        body::before {
            content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: .6;
            background-repeat: no-repeat;
            background-image:
                radial-gradient(1px 1px at 20% 30%, rgba(255,255,255,.7), transparent),
                radial-gradient(1px 1px at 70% 60%, rgba(255,255,255,.5), transparent),
                radial-gradient(1px 1px at 40% 80%, rgba(255,255,255,.6), transparent),
                radial-gradient(1.5px 1.5px at 85% 22%, rgba(255,255,255,.5), transparent),
                radial-gradient(1px 1px at 55% 12%, rgba(255,255,255,.45), transparent),
                radial-gradient(1px 1px at 12% 68%, rgba(255,255,255,.4), transparent),
                radial-gradient(1.5px 1.5px at 33% 48%, rgba(255,255,255,.4), transparent);
        }

        #drawingCanvas { cursor: crosshair; }

        /* Tool rail buttons */
        .tool-btn {
            width: 46px; height: 46px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            color: #94a3b8; background: transparent; cursor: pointer;
            transition: all .16s ease; position: relative;
        }
        .tool-btn i { font-size: 1.05rem; }
        .tool-btn:hover { background: rgba(255,255,255,.07); color: #f1f5f9; }
        .mode-btn.active {
            background: linear-gradient(180deg, var(--accent), var(--accent-strong));
            color: #fff;
            box-shadow: 0 8px 20px -8px var(--accent), inset 0 1px 0 rgba(255,255,255,.2);
        }
        /* Tooltip */
        .tool-btn::after {
            content: attr(data-tip);
            position: absolute; left: calc(100% + 12px); top: 50%;
            transform: translateY(-50%) scale(.96); transform-origin: left center;
            background: #0b1222; color: #e2e8f0; border: 1px solid var(--line);
            padding: .32rem .55rem; border-radius: .45rem; font-size: .72rem; font-weight: 500;
            white-space: nowrap; opacity: 0; pointer-events: none; z-index: 60;
            box-shadow: 0 8px 22px rgba(0,0,0,.45);
            transition: opacity .14s ease, transform .14s ease;
        }
        .tool-btn:hover::after { opacity: 1; transform: translateY(-50%) scale(1); }

        /* Buttons */
        .btn {
            display: inline-flex; align-items: center; justify-content: center; gap: .5rem;
            font-weight: 600; font-size: .85rem; padding: .55rem .95rem; border-radius: .65rem;
            cursor: pointer; border: 1px solid transparent; white-space: nowrap;
            transition: all .15s ease;
        }
        .btn i { font-size: .9em; }
        .btn-primary { background: linear-gradient(180deg, var(--accent), var(--accent-strong)); color: #fff; box-shadow: 0 8px 20px -10px var(--accent); }
        .btn-primary:hover { filter: brightness(1.08); }
        .btn-ghost { background: rgba(255,255,255,.045); color: #cbd5e1; border-color: var(--line); }
        .btn-ghost:hover { background: rgba(255,255,255,.09); color: #fff; border-color: rgba(148,163,184,.3); }
        .btn-danger { background: rgba(251,113,133,.08); color: #fda4af; border-color: rgba(251,113,133,.28); }
        .btn-danger:hover { background: rgba(251,113,133,.16); color: #fecdd3; }
        .btn-lg { padding: .8rem 1.25rem; font-size: .95rem; border-radius: .8rem; }
        .divider { width: 1px; height: 26px; background: var(--line); margin: 0 .2rem; }

        /* Star shape picker */
        .shape-btn {
            width: 32px; height: 32px; border-radius: 8px; cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            color: #94a3b8; font-size: .8rem; transition: all .15s ease;
        }
        .shape-btn:hover { background: rgba(255,255,255,.08); color: #e2e8f0; }
        .shape-btn.active { background: var(--accent-strong); color: #fff; }

        #notification {
            position: fixed; top: 22px; left: 50%;
            transform: translateX(-50%) translateY(-8px);
            background: rgba(11, 18, 34, .92); -webkit-backdrop-filter: blur(8px); backdrop-filter: blur(8px);
            color: #e2e8f0; padding: .75rem 1.15rem; border-radius: .7rem; border: 1px solid var(--line);
            box-shadow: 0 12px 34px rgba(0, 0, 0, .5); z-index: 1000; opacity: 0;
            font-size: .88rem; font-weight: 500; pointer-events: none;
            transition: opacity .3s ease, transform .3s ease;
        }
        #notification.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        #artboard {
            position: absolute; border-radius: 10px; overflow: hidden;
            border: 1px solid rgba(148, 163, 184, .25);
            box-shadow: 0 20px 60px -12px rgba(0, 0, 0, .8), 0 0 0 1px rgba(255, 255, 255, .06);
        }

        #backgroundCanvas.blurred { filter: blur(4px) brightness(60%); }
    </style>
</head>

<body class="h-screen flex">

    <!-- Left Toolbar -->
    <aside
        class="relative z-30 bg-slate-950/40 backdrop-blur-md border-r border-white/10 px-2.5 py-4 flex flex-col items-center gap-3 shrink-0">
        <div class="w-10 h-10 rounded-xl bg-cyan-500/15 border border-cyan-400/20 flex items-center justify-center text-cyan-300 mb-1">
            <i class="fas fa-star"></i>
        </div>
        <div class="flex flex-col items-center gap-1.5">
            <button id="addStarMode" class="mode-btn tool-btn" data-tip="Add stars" title="Add Stars">
                <i class="fas fa-star"></i>
            </button>
            <button id="connectStarMode" class="mode-btn tool-btn" data-tip="Connect stars" title="Connect Stars">
                <i class="fas fa-link"></i>
            </button>
            <button id="moveStarMode" class="mode-btn tool-btn" data-tip="Move stars" title="Move Stars">
                <i class="fas fa-arrows-up-down-left-right"></i>
            </button>
        </div>
        <div class="w-8 h-px bg-white/10 my-0.5"></div>
        <button id="blurBtn" class="mode-btn tool-btn hidden" data-tip="Toggle background blur" title="Blur Background">
            <i id="blurIcon" class="fas fa-eye"></i>
        </button>
    </aside>

    <!-- Main Content -->
    <main class="relative z-10 flex-1 min-w-0 flex flex-col p-3 sm:p-5">
        <div
            class="bg-slate-900/40 backdrop-blur-md border border-white/10 p-4 sm:p-5 rounded-2xl shadow-2xl flex-1 flex flex-col min-h-0">
            <!-- Header + toolbar -->
            <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-3 mb-4">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-xl bg-gradient-to-b from-cyan-500 to-cyan-600 flex items-center justify-center text-white shadow-lg shadow-cyan-900/40 shrink-0">
                        <i class="fas fa-star"></i>
                    </div>
                    <div>
                        <h1 class="text-xl sm:text-2xl font-bold tracking-tight text-white leading-tight">Constellation Creator</h1>
                        <p class="text-slate-400 text-xs sm:text-sm">Draw your own constellations on any image or a blank night sky.</p>
                    </div>
                </div>
                <div id="controls" class="flex flex-wrap items-center gap-2">
                    <button id="downloadCombinedBtn" class="btn btn-primary" title="Download the image with your constellation">
                        <i class="fas fa-image"></i> Download image
                    </button>
                    <button id="downloadDrawingBtn" class="btn btn-ghost" title="Download the drawing only (transparent background)">
                        <i class="fas fa-pen-nib"></i> Download Drawing
                    </button>
                    <button id="exportJsonBtn" class="btn btn-ghost" title="Export as JSON">
                        <i class="fas fa-file-export"></i> JSON
                    </button>
                    <span class="divider"></span>
                    <button id="clearDrawingBtn" class="btn btn-ghost" title="Clear all stars and lines">
                        <i class="fas fa-eraser"></i> Clear
                    </button>
                    <button id="resetBtn" class="btn btn-danger" title="Start over">
                        <i class="fas fa-arrow-rotate-left"></i> Reset
                    </button>
                    <input type="file" id="imageLoader" class="hidden" accept="image/*" />
                    <input type="file" id="jsonLoader" class="hidden" accept=".json" />
                </div>
            </div>

            <!-- Star style toolbar -->
            <div class="flex items-center gap-3 flex-wrap mb-3 px-0.5">
                <span class="text-[11px] font-semibold text-slate-400 uppercase tracking-wider">Star</span>
                <div id="shapeGroup" class="flex items-center gap-1 bg-white/5 border border-white/10 rounded-lg p-1">
                    <button class="shape-btn active" data-shape="dot" title="Dot"><i class="fas fa-circle"></i></button>
                    <button class="shape-btn" data-shape="star" title="5-point star"><i class="fas fa-star"></i></button>
                    <button class="shape-btn" data-shape="sparkle" title="4-point sparkle"><i class="fas fa-asterisk"></i></button>
                    <button class="shape-btn" data-shape="diamond" title="Diamond"><i class="fas fa-diamond"></i></button>
                </div>
                <div class="flex items-center gap-2">
                    <span class="text-xs text-slate-400">Size</span>
                    <input type="range" id="starSize" min="3" max="20" value="7" class="w-28 accent-cyan-500 cursor-pointer">
                    <span id="starSizeVal" class="text-xs text-slate-400 w-5 text-right tabular-nums">7</span>
                </div>
            </div>

            <!-- Canvas stage -->
            <div id="canvasContainer"
                class="flex-1 w-full min-h-0 rounded-xl overflow-hidden flex items-center justify-center relative border border-white/10"
                style="background: radial-gradient(circle at 50% 38%, rgba(30,41,59,.55), rgba(2,6,15,.9));">
                <div id="uploadPrompt"
                    class="flex flex-col items-center justify-center gap-5 p-6 text-center max-w-md">
                    <div class="w-16 h-16 rounded-2xl bg-cyan-500/10 border border-cyan-400/20 flex items-center justify-center text-cyan-300">
                        <i class="fas fa-wand-magic-sparkles fa-xl"></i>
                    </div>
                    <div>
                        <h3 class="text-lg font-semibold text-slate-100">Start a new constellation</h3>
                        <p class="text-slate-400 text-sm mt-1">Upload a photo, begin on a blank sky, or import a saved design.</p>
                    </div>
                    <div class="flex flex-col sm:flex-row flex-wrap items-center justify-center gap-3">
                        <label for="imageLoader" class="btn btn-primary btn-lg cursor-pointer">
                            <i class="fas fa-image"></i> Upload image
                        </label>
                        <button id="startBlankBtn" class="btn btn-ghost btn-lg">
                            <i class="fas fa-moon"></i> Blank canvas
                        </button>
                        <label for="jsonLoader" class="btn btn-ghost btn-lg cursor-pointer">
                            <i class="fas fa-file-import"></i> Import JSON
                        </label>
                    </div>
                </div>
                <div id="artboard" class="hidden">
                    <canvas id="backgroundCanvas" class="w-full h-full block"></canvas>
                    <canvas id="drawingCanvas" class="absolute top-0 left-0 w-full h-full block"></canvas>
                </div>
            </div>
        </div>
    </main>
    <div id="notification"></div>
    <script>
        // DOM Elements
        const imageLoader = document.getElementById('imageLoader'), jsonLoader = document.getElementById('jsonLoader');
        const artboard = document.getElementById('artboard');
        const backgroundCanvas = document.getElementById('backgroundCanvas'), backgroundCtx = backgroundCanvas.getContext('2d');
        const drawingCanvas = document.getElementById('drawingCanvas'), drawingCtx = drawingCanvas.getContext('2d');
        const clearDrawingBtn = document.getElementById('clearDrawingBtn'), resetBtn = document.getElementById('resetBtn');
        const canvasContainer = document.getElementById('canvasContainer'), uploadPrompt = document.getElementById('uploadPrompt');
        const notification = document.getElementById('notification');
        const addStarModeBtn = document.getElementById('addStarMode'), connectStarModeBtn = document.getElementById('connectStarMode');
        const moveStarModeBtn = document.getElementById('moveStarMode'), blurBtn = document.getElementById('blurBtn'), blurIcon = document.getElementById('blurIcon');
        const downloadCombinedBtn = document.getElementById('downloadCombinedBtn'), downloadDrawingBtn = document.getElementById('downloadDrawingBtn');
        const exportJsonBtn = document.getElementById('exportJsonBtn'), startBlankBtn = document.getElementById('startBlankBtn');
        const shapeGroup = document.getElementById('shapeGroup'), starSizeInput = document.getElementById('starSize'), starSizeVal = document.getElementById('starSizeVal');

        // State Management
        let backgroundImage = null, isFromUploadedImage = false, stars = [], lines = [], starIdCounter = 0;
        let mode = 'add', selectedStarForConnection = null, draggedStar = null, isStarDragging = false, isBlurred = false;
        const STAR_RADIUS = 7;
        let currentShape = 'dot', currentSize = 7;
        let notificationTimeout;

        // Initial Setup
        setMode('add');

        // Event Listeners
        imageLoader.addEventListener('change', handleImageUpload);
        jsonLoader.addEventListener('change', handleJsonUpload);

        shapeGroup.querySelectorAll('.shape-btn').forEach(btn => btn.addEventListener('click', () => {
            currentShape = btn.dataset.shape;
            shapeGroup.querySelectorAll('.shape-btn').forEach(b => b.classList.toggle('active', b === btn));
        }));
        starSizeInput.addEventListener('input', () => {
            currentSize = parseInt(starSizeInput.value, 10);
            starSizeVal.textContent = currentSize;
        });
        startBlankBtn.addEventListener('click', () => handleStartBlank());

        addStarModeBtn.addEventListener('click', () => setMode('add'));
        connectStarModeBtn.addEventListener('click', () => setMode('connect'));
        moveStarModeBtn.addEventListener('click', () => setMode('move'));
        blurBtn.addEventListener('click', toggleBlur);

        drawingCanvas.addEventListener('mousedown', handleStarDragStart);
        window.addEventListener('mousemove', handleWindowMouseMove);
        window.addEventListener('mouseup', handleWindowMouseUp);
        drawingCanvas.addEventListener('click', handleCanvasClick);

        clearDrawingBtn.addEventListener('click', clearDrawing);
        resetBtn.addEventListener('click', resetAll);
        downloadCombinedBtn.addEventListener('click', downloadCombinedImage);
        downloadDrawingBtn.addEventListener('click', downloadDrawingOnly);
        exportJsonBtn.addEventListener('click', exportConstellationJSON);

        window.addEventListener('resize', () => {
            if (backgroundImage) {
                setupCanvas();
                draw();
            }
        });

        function showNotification(message) {
            clearTimeout(notificationTimeout);
            notification.textContent = message;
            notification.classList.add('show');
            notificationTimeout = setTimeout(() => { notification.classList.remove('show'); }, 3000);
        }

        function handleImageUpload(e) {
            const reader = new FileReader();
            reader.onload = (event) => {
                isFromUploadedImage = true;
                startWithImage(event.target.result);
                blurBtn.classList.remove('hidden');
            };
            if (e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
        }

        function handleStartBlank(callback) {
            isFromUploadedImage = false;
            const w = 600;
            const h = 600;
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = w; tempCanvas.height = h;
            const tempCtx = tempCanvas.getContext('2d');
            tempCtx.fillStyle = 'black';
            tempCtx.fillRect(0, 0, w, h);
            startWithImage(tempCanvas.toDataURL(), callback);
            blurBtn.classList.add('hidden');
        }

        function handleJsonUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                try {
                    const data = JSON.parse(event.target.result);
                    if (!data.stars || !data.connections) {
                        showNotification("Invalid JSON file format.");
                        return;
                    }
                    handleStartBlank(() => loadConstellationFromJSON(data));
                } catch (error) { showNotification("Could not parse JSON file."); }
            };
            reader.readAsText(file);
            e.target.value = '';
        }

        function loadConstellationFromJSON(data) {
            clearDrawing();
            let maxId = -1;
            stars = Object.keys(data.stars).map(starId => {
                const starData = data.stars[starId];
                const idNum = parseInt(starId.replace('star_', ''));
                if (idNum > maxId) maxId = idNum;
                return {
                    id: starId,
                    x: (starData.x_percent / 100) * drawingCanvas.width,
                    y: (starData.y_percent / 100) * drawingCanvas.height,
                    shape: starData.shape || 'dot',
                    size: starData.size || STAR_RADIUS
                };
            });
            starIdCounter = maxId + 1;
            lines = data.connections.map(conn => ({ startId: conn.from, endId: conn.to }));
            draw();
        }

        function startWithImage(src, callback) {
            backgroundImage = new Image();
            backgroundImage.onload = () => {
                setupCanvas();
                draw();
                uploadPrompt.classList.add('hidden');
                artboard.classList.remove('hidden');
                if (callback && typeof callback === 'function') callback();
            };
            backgroundImage.src = src;
        }

        function toggleBlur() {
            if (!isFromUploadedImage) return;
            isBlurred = !isBlurred;
            backgroundCanvas.classList.toggle('blurred', isBlurred);
            blurIcon.classList.toggle('fa-eye', !isBlurred);
            blurIcon.classList.toggle('fa-eye-slash', isBlurred);
        }

        function setMode(newMode) {
            mode = newMode;
            [addStarModeBtn, connectStarModeBtn, moveStarModeBtn].forEach(btn => btn.classList.remove('active'));
            document.getElementById(`${newMode}StarMode`).classList.add('active');
            drawingCanvas.style.cursor = (mode === 'move') ? 'grab' : (mode === 'connect') ? 'pointer' : 'crosshair';
            selectedStarForConnection = null;
            draw();
        }

        function clearDrawing() {
            stars = []; lines = []; starIdCounter = 0; selectedStarForConnection = null;
            draw();
        }

        function resetAll() {
            backgroundImage = null; isFromUploadedImage = false; isBlurred = false;
            backgroundCanvas.classList.remove('blurred');
            blurBtn.classList.add('hidden');
            clearDrawing();
            uploadPrompt.classList.remove('hidden');
            artboard.classList.add('hidden');
            imageLoader.value = ''; jsonLoader.value = '';
            setMode('add');
        }

        function getStarAtPosition(x, y) {
            for (let i = stars.length - 1; i >= 0; i--) {
                const star = stars[i];
                const distance = Math.sqrt((star.x - x) ** 2 + (star.y - y) ** 2);
                // Use the star's own radius (with a comfortable minimum) for hit-testing.
                if (distance < Math.max(star.size || STAR_RADIUS, 8)) return star;
            }
            return null;
        }

        function handleCanvasClick(e) {
            if (!backgroundImage) return;

            const { x, y } = getMousePos(e);
            const clickedStar = getStarAtPosition(x, y);

            if (mode === 'add' && !clickedStar) stars.push({ id: `star_${starIdCounter++}`, x, y, shape: currentShape, size: currentSize });
            else if (mode === 'connect') {
                if (clickedStar) {
                    if (!selectedStarForConnection) selectedStarForConnection = clickedStar;
                    else if (selectedStarForConnection.id !== clickedStar.id) {
                        lines.push({ startId: selectedStarForConnection.id, endId: clickedStar.id });
                        selectedStarForConnection = null;
                    }
                } else selectedStarForConnection = null;
            }
            draw();
        }

        function handleStarDragStart(e) {
            if (mode !== 'move' || !backgroundImage) return;
            const { x, y } = getMousePos(e);
            draggedStar = getStarAtPosition(x, y);
            if (draggedStar) {
                isStarDragging = true;
                drawingCanvas.style.cursor = 'grabbing';
            }
        }

        function getMousePos(e) {
            const rect = drawingCanvas.getBoundingClientRect();
            return { x: e.clientX - rect.left, y: e.clientY - rect.top };
        }

        function setupCanvas() {
            if (!backgroundImage) return;
            const containerW = canvasContainer.clientWidth;
            const containerH = canvasContainer.clientHeight;
            let w, h;

            const oldWidth = backgroundCanvas.width;
            const oldHeight = backgroundCanvas.height;

            if (isFromUploadedImage) {
                const imgRatio = backgroundImage.width / backgroundImage.height;
                const maxW = containerW * 0.95;
                const maxH = containerH * 0.95;
                if (imgRatio > maxW / maxH) {
                    w = maxW;
                    h = w / imgRatio;
                } else {
                    h = maxH;
                    w = h * imgRatio;
                }
            } else {
                w = backgroundImage.width;
                h = backgroundImage.height;
            }

            artboard.style.width = `${w}px`;
            artboard.style.height = `${h}px`;
            artboard.style.top = `${(containerH - h) / 2}px`;
            artboard.style.left = `${(containerW - w) / 2}px`;

            if (oldWidth > 0 && oldHeight > 0 && (oldWidth !== w || oldHeight !== h)) {
                stars.forEach(star => {
                    star.x = star.x * (w / oldWidth);
                    star.y = star.y * (h / oldHeight);
                    if (star.size) star.size = star.size * (w / oldWidth);
                });
            }

            [backgroundCanvas, drawingCanvas].forEach(c => { c.width = w; c.height = h; });
        }

        function draw() {
            if (!backgroundImage) return;
            backgroundCtx.clearRect(0, 0, backgroundCanvas.width, backgroundCanvas.height);
            backgroundCtx.drawImage(backgroundImage, 0, 0, backgroundCanvas.width, backgroundCanvas.height);
            drawingCtx.clearRect(0, 0, drawingCanvas.width, drawingCanvas.height);
            drawConstellation(drawingCtx);
        }

        function drawConstellation(targetCtx) {
            targetCtx.strokeStyle = 'rgba(255, 255, 255, 0.7)'; targetCtx.lineWidth = 2;
            targetCtx.shadowColor = 'rgba(255, 255, 255, 0.8)'; targetCtx.shadowBlur = 10;
            lines.forEach(line => {
                const startStar = stars.find(s => s.id === line.startId);
                const endStar = stars.find(s => s.id === line.endId);
                if (startStar && endStar) {
                    targetCtx.beginPath(); targetCtx.moveTo(startStar.x, startStar.y); targetCtx.lineTo(endStar.x, endStar.y); targetCtx.stroke();
                }
            });
            stars.forEach(star => {
                targetCtx.fillStyle = 'white';
                if (selectedStarForConnection && selectedStarForConnection.id === star.id) targetCtx.fillStyle = '#22d3ee';
                targetCtx.shadowColor = 'rgba(255, 255, 255, 1)'; targetCtx.shadowBlur = 15;
                drawStarShape(targetCtx, star);
            });
            targetCtx.shadowColor = 'transparent'; targetCtx.shadowBlur = 0;
        }

        function drawStarShape(ctx, star) {
            const s = star.size || STAR_RADIUS;
            const shape = star.shape || 'dot';
            ctx.beginPath();
            if (shape === 'dot') {
                ctx.arc(star.x, star.y, s, 0, Math.PI * 2);
            } else if (shape === 'diamond') {
                ctx.moveTo(star.x, star.y - s);
                ctx.lineTo(star.x + s, star.y);
                ctx.lineTo(star.x, star.y + s);
                ctx.lineTo(star.x - s, star.y);
                ctx.closePath();
            } else {
                // Pointed star: 'sparkle' = 4 points, 'star' = 5 points
                const points = shape === 'sparkle' ? 4 : 5;
                const outer = s * 1.5;
                const inner = s * (shape === 'sparkle' ? 0.42 : 0.5);
                for (let i = 0; i < points * 2; i++) {
                    const r = (i % 2 === 0) ? outer : inner;
                    const ang = (Math.PI / points) * i - Math.PI / 2;
                    const px = star.x + Math.cos(ang) * r;
                    const py = star.y + Math.sin(ang) * r;
                    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
                }
                ctx.closePath();
            }
            ctx.fill();
        }

        function downloadCanvas(fileName, includeBackground) {
            if (!backgroundImage) { showNotification("Please start a project first."); return; }
            const tempCanvas = document.createElement('canvas');
            tempCanvas.width = drawingCanvas.width; tempCanvas.height = drawingCanvas.height;
            const tempCtx = tempCanvas.getContext('2d');
            if (includeBackground) {
                tempCtx.filter = isBlurred ? 'blur(4px) brightness(60%)' : 'none';
                tempCtx.drawImage(backgroundImage, 0, 0, tempCanvas.width, tempCanvas.height);
                tempCtx.filter = 'none';
            }
            tempCtx.drawImage(drawingCanvas, 0, 0, tempCanvas.width, tempCanvas.height);
            const link = document.createElement('a');
            link.download = fileName; link.href = tempCanvas.toDataURL('image/png');
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
        }

        function downloadCombinedImage() { downloadCanvas('constellation_creator_img.png', true); }
        function downloadDrawingOnly() { downloadCanvas('constellation_creator_drawing.png', false); }

        function exportConstellationJSON() {
            if (!backgroundImage || stars.length === 0) { showNotification("Please draw a constellation first."); return; }
            const exportData = {
                stars: stars.reduce((acc, star) => {
                    acc[star.id] = {
                        x_percent: (star.x / drawingCanvas.width) * 100,
                        y_percent: (star.y / drawingCanvas.height) * 100,
                        shape: star.shape || 'dot',
                        size: star.size || STAR_RADIUS
                    };
                    return acc;
                }, {}),
                connections: lines.map(line => ({ from: line.startId, to: line.endId }))
            };
            const jsonString = JSON.stringify(exportData, null, 2);
            const blob = new Blob([jsonString], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.download = 'constellation_creator.json'; link.href = url;
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }

        function handleWindowMouseMove(e) {
            if (isStarDragging) {
                const { x, y } = getMousePos(e);
                draggedStar.x = x;
                draggedStar.y = y;
                draw();
            }
        }

        function handleWindowMouseUp() {
            isStarDragging = false;
            draggedStar = null;
        }
    </script>
</body>

</html>
